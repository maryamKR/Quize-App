<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
    /*---- COLORS ----*/
      --color-grey-500: #626C7F;
      --color-grey-50: #F4F6FA;

      --color-bleu-950: #2D3949;
      --color-bleu-900: #313E51;
      --color-bleu-850: #3B4D66;
      --color-bleu-500: #306AFF;
      --color-bleu-300: #ABC1E1;
      --color-bleu-100: #EDF1F9;
      --color-bleu-50: #EBF0FF;

      --color-green-500: #2FD887;
      --color-green-100: #E0FDEF;

      --color-purple-600: #A729F5;
      --color-purple-100: #F6E7FF;

      --color-orange-400: #FF7E35;
      --color-orange-50: #FFF5ED;

      --color-red-500: #EE5454;

      /* ---- font ---- */
      --font-Rubik: "Rubik", sans-serif;
      --font-inherit: inherit;

      /*---- Typography ----*/
      --text-prst-1: 144px;
        --text-prst-1--line-height: 100%;
      --text-prst-1-sm: 88px;
        --text-prst-1-sm--line-height: 100%;
      
      --text-prst-2: 64px;
        --text-prst-2--line-height: 100%;
      --text-prst-2-sm: 40px;
        --text-prst-2-sm--line-height: 100%;

      --text-prst-3: 36px;
        --text-prst-3--line-height: 120%;
      --text-prst-3-sm: 20px;
        --text-prst-3-sm--line-height: 120%;

      --text-prst-4: 28px;
        --text-prst-4--line-height: 100%;
      --text-prst-4-sm: 18px;
        --text-prst-4-sm--line-height: 100%;
      
      --text-prst-5: 24px;
        --text-prst-5--line-height: 150%;
      --text-prst-5-sm: 14px;
        --text-prst-5-sm--line-height: 150%;

      --text-prst-6: 20px;
        --text-prst-6--line-height: 150%;
    }

    body { 
      @apply font-Rubik text-white bg-bleu-950 min-h-screen
    }
    button { @apply font-inherit }

     .container { @apply w-full max-w-[1320px]  mx-auto px-[16px]}

    .text-Preset1 {
      @apply text-prst-1 font-medium tracking-normal
    }

    .text-Preset1-mobile {
      @apply text-prst-1-sm font-medium tracking-normal
    }

    .text-Preset2-Md {
      @apply text-prst-2 font-medium tracking-normal
    }

    .text-Preset2-Md-mobile {
      @apply text-prst-2-sm font-medium tracking-normal
    }

    .text-Preset2-Lt {
      @apply text-prst-2 font-light tracking-normal
    }

    .text-Preset2-Lt-mobile {
      @apply text-prst-2-sm font-light tracking-normal
    }

    .text-Preset3 {
      @apply text-prst-3 font-medium tracking-normal
    }

    .text-Preset3-mobile {
      @apply text-prst-3-sm font-medium tracking-normal
    }

    .text-Preset4 {
      @apply text-prst-4 font-medium tracking-normal
    }

    .text-Preset4-mobile {
      @apply text-prst-4-sm font-medium tracking-normal
    }

    .text-Preset5-Md {
      @apply text-prst-5 font-medium tracking-normal
    }

    .text-Preset5-Bs {
      @apply text-prst-5 font-normal tracking-normal
    }

    .text-Preset5-mobile {
      @apply text-prst-5-sm italic tracking-normal
    }

    .text-Preset6 {
      @apply text-prst-6 italic tracking-normal
    }

    /*---- SPACING ----*/
    .spacing-100 {@apply w-[8px]}
    .spacing-200 {@apply w-[16px]}
    .spacing-300 {@apply w-[24px]}
    .spacing-400 {@apply w-[32px]}
    .spacing-500 {@apply w-[40px]}
    .spacing-600 {@apply w-[48px]}
    .spacing-800 {@apply w-[64px]}
    .spacing-1600 {@apply w-[128px]}
    .spacing-1800 {@apply w-[144px]}
    .spacing-2300 {@apply w-[184px]}


    /*---- COMPONENTS ----*/

    /* Logo */
    .logo {@apply flex md:gap-[24px] sm:gap-[16px]}
    .bg_icon {@apply md:w-[56px] md:h-[56px] sm:w-[40px] sm:h-[40px] rounded-[8px] flex items-center justify-center}

    /* Light/Dark Mode Button */
    .light_dark_mode {@apply flex md:gap-[16px] sm:gap-[8px] items-center}

    /* Progress Bar */
    .progress {@apply w-full h-[16px] bg-bleu-850 p-[4px] rounded-[999px] }
    .progress_bar {@apply md:w-[300px] sm:w-[152px] h-[8px] bg-purple-600 rounded-[104px] }

    /* Wrong Answer Notificatio */
    .wrong_msg {@apply flex items-center gap-[8px] text-red-500 }

    /* Button Submit*/
    .btn_sub {@apply w-full md:h-[92px] sm:h-[56px] p-[32px] rounded-[24px] bg-purple-600 text-center shadow-[0px_16px_40px_0px_#8FA0C124] hover:bg-purple-100}
    
    /* Button with Icon*/
    .btn_icon {@apply bg-bleu-850 flex items-center gap-[32px] w-full h-[104px] p-[24px] rounded-[24px] border-[3px] border-transparent shadow-[0px_16px_40px_0px_#313E5124] }
    /*Note: class d icon li f fldakhel deayl had button hwa "bg_icon*/

    /* Button Options */
  .answers {
    @apply flex items-center gap-[32px] w-full h-[104px] p-[24px] rounded-[24px] border-[3px] border-transparent shadow-[0px_16px_40px_0px_#313E5124] bg-bleu-850 hover:border-purple-600 active:border-purple-600 cursor-pointer
  }
 




</style>
</head>

<body>
  <div class="container">
    <header class="flex justify-end items-center pt-[97px] mb-[99px]">
      <div class="flex items-center gap-[16px]">
        <img src="assets/fluent_weather-sunny-16-regular.svg" alt="sun" class="w-[24px] h-[24px]" />
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" class="sr-only peer" />
          <div
            class="w-12 h-7 bg-purple-600 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all">
          </div>
        </label>
        <img src="assets/fluent_weather-moon-16-regular.svg" alt="moon" class="w-[24px] h-[24px]" />
      </div>
    </header>

    <section id="page_subjects">
      <div class="grid lg:grid-cols-2 gap-16 lg:gap-[128px]">
        <div class="flex flex-col">
        <h1 class="text-5xl lg:text-64px font-light leading-tight text-white">
          Welcome to the <br />
          <span class="font-bold">Frontend Quiz!</span>
        </h1>
        <p class="mt-8 text-color-grey-500 italic text-xl">
          Pick a subject to get started.
        </p>
      </div>

      <div class="space-y-6">
        <button onclick="goToQuiz(0)" id="subj"
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group">
          <span class="w-14 h-14 flex items-center justify-center bg-orange-100 rounded-xl mr-8">
            <img src="assets/Subject Icon Container.png" alt="" class="w-10" />
          </span>
          <span class="text-2xl font-medium text-white">HTML</span>
        </button>

        <button onclick="goToQuiz(1)" id="subj"
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group">
          <span class="w-14 h-14 flex items-center justify-center bg-green-100 rounded-xl mr-8">
            <img src="assets/Subject Icon Container-2.png" alt="" class="w-10" />
          </span>
          <span class="text-2xl font-medium text-white">CSS</span>
        </button>

        <button onclick="goToQuiz(2)" id="subj"
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group">
          <span class="w-14 h-14 flex items-center justify-center bg-blue-100 rounded-xl mr-8">
            <img src="assets/Subject Icon Container-3.png" alt="" class="w-10" />
          </span>
          <span class="text-2xl font-medium text-white">JavaScript</span>
        </button>

        <button onclick="goToQuiz(3)" id="subj"
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group">
          <span class="w-14 h-14 flex items-center justify-center bg-purple-100 rounded-xl mr-8">
            <img src="assets/Subject Icon Container-4.png" alt="" class="w-10" />
          </span>
          <span class="text-2xl font-medium text-white">Accessibility</span>
        </button>
      </div>
      </div>
    </section>

      

      
  </div>

  <script src="A_script.js"></script>
</body>

</html>
