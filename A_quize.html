<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quize App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
    rel="stylesheet">
    
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
    /*---- COLORS ----*/
      --color-grey-500: #626C7F;
      --color-grey-50: #F4F6FA;

      --color-bleu-950: #2D3949;
      --color-bleu-900: #313E51;
      --color-bleu-850: #3B4D66;
      --color-bleu-500: #306AFF;
      --color-bleu-300: #ABC1E1;
      --color-bleu-100: #EDF1F9;
      --color-bleu-50: #EBF0FF;

      --color-green-500: #2FD887;
      --color-green-100: #E0FDEF;

      --color-purple-600: #A729F5; 
      --color-purple-300: #d394fa; 
      --color-purple-100: #F6E7FF;

      --color-orange-400: #FF7E35;
      --color-orange-50: #FFF5ED;

      --color-red-500: #EE5454;

      /* ---- font ---- */
      --font-Rubik: "Rubik", sans-serif;
      --font-inherit: inherit;

      /*---- Typography ----*/
      --text-prst-1: 144px;
        --text-prst-1--line-height: 100%;
      --text-prst-1-sm: 88px;
        --text-prst-1-sm--line-height: 100%;
      
      --text-prst-2: 64px;
        --text-prst-2--line-height: 100%;
      --text-prst-2-sm: 40px;
        --text-prst-2-sm--line-height: 100%;

      --text-prst-3: 36px;
        --text-prst-3--line-height: 120%;
      --text-prst-3-sm: 20px;
        --text-prst-3-sm--line-height: 120%;

      --text-prst-4: 28px;
        --text-prst-4--line-height: 100%;
      --text-prst-4-sm: 18px;
        --text-prst-4-sm--line-height: 100%;
      
      --text-prst-5: 24px;
        --text-prst-5--line-height: 150%;
      --text-prst-5-sm: 14px;
        --text-prst-5-sm--line-height: 150%;

      --text-prst-6: 20px;
        --text-prst-6--line-height: 150%;
    }

    body { 
      @apply font-Rubik text-white bg-bleu-900 min-h-screen
    }
    button { @apply font-inherit }

     .container { @apply w-full max-w-[1320px]  mx-auto px-[16px]}

    .text-Preset1 {
      @apply md:text-prst-1 text-prst-1-sm font-medium tracking-normal
    }

    .text-Preset2-Md {
      @apply md:text-prst-2 text-prst-2-sm font-medium tracking-normal
    }

    .text-Preset2-Lt {
      @apply md:text-prst-2 text-prst-2-sm font-light tracking-normal
    }

    .text-Preset3 {
      @apply md:text-prst-3 text-prst-3-sm font-medium tracking-normal
    }

    .text-Preset4 {
      @apply md:text-prst-4 text-prst-4-sm font-medium tracking-normal
    }

    .text-Preset5-Md {
      @apply text-prst-5 font-medium tracking-normal
    }

    .text-Preset5-Bs {
      @apply md:text-prst-5 text-prst-5-sm font-normal tracking-normal
    }

    .text-Preset6 {
      @apply text-prst-6 italic tracking-normal
    }

    /*---- SPACING ----*/
    .spacing-100 {@apply w-[8px]}
    .spacing-200 {@apply w-[16px]}
    .spacing-300 {@apply w-[24px]}
    .spacing-400 {@apply w-[32px]}
    .spacing-500 {@apply w-[40px]}
    .spacing-600 {@apply w-[48px]}
    .spacing-800 {@apply w-[64px]}
    .spacing-1600 {@apply w-[128px]}
    .spacing-1800 {@apply w-[144px]}
    .spacing-2300 {@apply w-[184px]}


    /*---- COMPONENTS ----*/

    /* Logo */
    .logo {@apply flex items-center md:gap-[24px] sm:gap-[16px]}
    .bg_icon {@apply md:w-[56px] md:h-[56px] sm:w-[40px] sm:h-[40px] rounded-[8px] flex items-center justify-center}

    /* Light/Dark Mode Button */
    .light_dark_mode {@apply flex md:gap-[16px] sm:gap-[8px] items-center}

    /* Progress Bar */
    .progress {@apply w-full h-[16px] bg-bleu-850 p-[4px] rounded-[999px] }
    .progress_bar {@apply md:w-[300px] sm:w-[152px] h-[8px] bg-purple-600 rounded-[104px] }

    /* Wrong Answer Notificatio */
    .wrong_msg {@apply flex items-center justify-center gap-[8px] text-red-500 }

    /* Button Submit*/
     .btn_sub {@apply w-full md:h-[92px] sm:h-[56px] flex items-center justify-center rounded-[24px] bg-purple-600 text-center shadow-[0px_16px_40px_0px_#8FA0C124] cursor-pointer hover:bg-purple-300}

    /* Button Options */
  .answers {
    @apply flex items-center gap-[32px] w-full h-[104px] p-[24px] rounded-[24px] border-[3px] border-transparent shadow-[0px_16px_40px_0px_#313E5124] bg-bleu-850 hover:border-purple-600 active:border-purple-600 cursor-pointer 
  }
  .answers_icons {@apply md:w-[56px] md:h-[56px] sm:w-[40px] sm:h-[40px] rounded-[8px] flex items-center justify-center }

  .correct_answer {@apply flex items-center gap-[32px] w-full h-[104px] p-[24px] rounded-[24px] border-[3px] border-green-500 shadow-[0px_16px_40px_0px_#313E5124] bg-bleu-850 cursor-pointer}
  .correct_icons {@apply bg-green-500 text-white}

    .wrong_answer { @apply flex items-center gap-[32px] w-full h-[104px] p-[24px] rounded-[24px] border-[3px] border-red-500 shadow-[0px_16px_40px_0px_#313E5124] bg-bleu-850 cursor-pointer}
    .wrong_icons {@apply bg-red-500 text-white}

    button { @apply outline-none }

</style>
</head>

<body class="relative overflow-hidden">

  <!-- BACKGROUND ELLIPSES -->
  <img src="assets/Ellipse 8.png" class="absolute -top-[413px] left-[-539px] w-[977px] pointer-events-none -z-10">

  <img src="assets/Ellipse 9.png" class="absolute top-[352px] right-0 w-[977px] pointer-events-none -z-10">
  <div class="relative z-10">
    <div class="container lg:space-y-[85px] md:space-y-[49px] sm:space-y-[32px] lg:pt-[83px] md:pt-[40px] pt-0">
      <header class="flex justify-between items-center md:py-0 py-[16px]">
        <div class="logo">
          <span class="bg_icon bg-purple-100">
            <img src="assets/logo.png" alt="Accessibility" class="md:w-[30px] sm:w-[21px]" />
          </span>
          <h2 class="text-Preset4">Accessibility</h2>
        </div>

        <div class="flex items-center gap-4">
          <img src="assets/fluent_weather-sunny-16-regular.svg" alt="sun" class="w-6 h-6" />
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" />
            <div
              class="w-12 h-7 bg-purple-600 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all">
            </div>
          </label>
          <img src="assets/fluent_weather-moon-16-regular.svg" alt="moon" class="w-6 h-6" />
        </div>
      </header>

      <section id="page_questions">
        <div class="grid lg:grid-cols-2 gap-[40px] lg:gap-32">
          <div class="flex flex-col lg:gap-[184px] md:gap-[40px] gap-[24px]">
            <div class="space-y-[24px] sm:space-y-[16px]">
              <p id="Ques_counter" class="text-bleu-300 text-Preset6">

              </p>
              <h1 id="question" class="text-Preset3">
              </h1>
            </div>

            <div class="lg:mt-0 bg-bleu-850 h-4 rounded-full p-1">
              <div class="bg-purple-600 h-[8px] rounded-full transition-all duration-500 w-0" id="progress"></div>
            </div>
          </div>

          <div class="space-y-[32px]">
            <div class="space-y-[16px]" id="options"> </div>


            <button id="next" class="btn_sub text-white text-Preset4 transition-all">
              Submit Answers
            </button>
            <div id="alert" class="hidden flex items-center gap-3 whitespace-nowrap">
              <img src="assets/fluent_dismiss-circle-16-regular.png" alt="">
              <p class="text-Preset5-Bs text-white">Please select an answer</p>
            </div>
          </div>
        </div>
      </section>

    </div>
  </div>
  <script src="A_quize.js"></script>
</body>

</html>
