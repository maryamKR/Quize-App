<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frontend Quiz App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  
  <body class="bg-[#2D3949] min-h-screen font-['Rubik'] text-white">
     <div class="max-w-7xl mx-auto px-6 py-10 lg:py-20">
      <header class="flex items-center mb-16 lg:mb-24">
        

        <div class="flex items-center gap-4">
          <img
            src="assets/fluent_weather-sunny-16-regular.svg"
            alt="sun"
            class="w-6 h-6"
          />
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer"/>
            <div class="w-12 h-7 bg-purple-600 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"
            ></div>
          </label>
          <img
            src="assets/fluent_weather-moon-16-regular.svg"
            alt="moon"
            class="w-6 h-6"
          />
        </div>
      </header>
    
    <section class="grid lg:grid-cols-2 gap-16 lg:gap-32 mx-auto max-w-7xl px-6 py-10 lg:py-20">
        
        <div class="flex flex-col">
        <h1 class="text-5xl lg:text-64px font-light leading-tight text-white">
          Welcome to the <br />
          <span class="font-bold">Frontend Quiz!</span>
        </h1>
        <p class="mt-8 text-color-grey-500 italic text-xl">
          Pick a subject to get started.
        </p>
      </div>

      <div class="space-y-6">
        <button
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group"
        >
          <span
            class="w-14 h-14 flex items-center justify-center bg-orange-100 rounded-xl mr-8"
          >
            <img src="assets/Subject Icon Container.png" alt="" class="w-10" />
          </span>
          <span class="text-2xl font-medium text-white">HTML</span>
        </button>

        <button
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group"
        >
          <span
            class="w-14 h-14 flex items-center justify-center bg-green-100 rounded-xl mr-8"
          >
            <img
              src="assets/Subject Icon Container-2.png"
              alt=""
              class="w-10"
            />
          </span>
          <span class="text-2xl font-medium text-white">CSS</span>
        </button>

        <button
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group"
        >
          <span
            class="w-14 h-14 flex items-center justify-center bg-blue-100 rounded-xl mr-8"
          >
            <img
              src="assets/Subject Icon Container-3.png"
              alt=""
              class="w-10"
            />
          </span>
          <span class="text-2xl font-medium text-white">JavaScript</span>
        </button>

        <button
          class="w-full flex items-center p-5 bg-color-bleu-800 rounded-3xl hover:ring-2 hover:ring-purple-600 transition-all group"
        >
          <span
            class="w-14 h-14 flex items-center justify-center bg-purple-100 rounded-xl mr-8"
          >
            <img
              src="assets/Subject Icon Container-4.png"
              alt=""
              class="w-10"
            />
          </span>
          <span class="text-2xl font-medium text-white">Accessibility</span>
        </button>
      </div>
    </section>

    <div class="max-w-7xl mx-auto px-6 py-10 lg:py-20">
      <header class="flex justify-between items-center mb-16 lg:mb-24">
        <div class="flex items-center gap-4">
          <span class="p-2 bg-white/10 rounded-xl">
            <img
              src="assets/Subject Icon Container-4.png"
              alt="Accessibility"
              class="w-10 h-10"
            />
          </span>
          <h2 class="text-2xl font-medium tracking-wide">Accessibility</h2>
        </div>

        <div class="flex items-center gap-4">
          <img
            src="assets/fluent_weather-sunny-16-regular.svg"
            alt="sun"
            class="w-6 h-6"
          />
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" class="sr-only peer" />
            <div
              class="w-12 h-7 bg-purple-600 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"
            ></div>
          </label>
          <img
            src="assets/fluent_weather-moon-16-regular.svg"
            alt="moon"
            class="w-6 h-6"
          />
        </div>
      </header>

      <main class="grid lg:grid-cols-2 gap-16 lg:gap-32">
        <section class="flex flex-col justify-between">
          <div>
            <p class="text-color-grey-500 italic text-xl mb-7">
              Question 6 of 10
            </p>
            <h1 class="text-4xl lg:text-5xl font-medium leading-tight">
              Which of these color contrast ratios defines the minimum
              requirement for WCAG 2.1 Level AA?
            </h1>
          </div>

          <div class="mt-12 lg:mt-0 bg-color-bleu-800 h-4 rounded-full p-1">
            <div
              class="bg-purple-600 h-full rounded-full transition-all duration-500"
              style="width: 60%"
            ></div>
          </div>
        </section>

        <section class="space-y-6">
          <button
            class="w-full group flex items-center p-4 bg-color-bleu-800 border-4 border-purple-600 rounded-3xl transition-all"
          >
            <span
              class="w-14 h-14 flex items-center justify-center bg-purple-600 text-white text-2xl font-bold rounded-xl mr-8"
              >A</span
            >
            <span class="text-2xl font-medium">4.5:1</span>
          </button>

          <button
            class="w-full group flex items-center p-4 bg-color-bleu-800 border-4 border-transparent hover:border-purple-600/50 rounded-3xl transition-all"
          >
            <span
              class="w-14 h-14 flex items-center justify-center bg-color-grey-50 text-color-grey-500 text-2xl font-bold rounded-xl mr-8 group-hover:bg-purple-100 group-hover:text-purple-600"
              >B</span
            >
            <span class="text-2xl font-medium">3:1</span>
          </button>

          <button
            class="w-full group flex items-center p-4 bg-color-bleu-800 border-4 border-transparent hover:border-purple-600/50 rounded-3xl transition-all"
          >
            <span
              class="w-14 h-14 flex items-center justify-center bg-color-grey-50 text-color-grey-500 text-2xl font-bold rounded-xl mr-8 group-hover:bg-purple-100 group-hover:text-purple-600"
              >C</span
            >
            <span class="text-2xl font-medium">2:1</span>
          </button>

          <button
            class="w-full mt-4 py-6 bg-purple-600 hover:bg-purple-500 text-white text-2xl font-bold rounded-3xl transition-all shadow-lg shadow-purple-900/20"
          >
            Submit Answer
          </button>
        </section>
       <div class="max-w-7xl mx-auto px-6 py-10 lg:py-20">
        <header class="flex justify-between items-center mb-16 lg:mb-24">
          <div class="flex items-center gap-4">
            <span class="p-2 bg-white/10 rounded-xl">
               <img src="assets/Subject Icon Container-4.png" alt="Accessibility" class="w-10 h-10">
            </span>
            <h2 class="text-2xl font-medium tracking-wide">Accessibility</h2>
       </div>

      <div class="flex items-center gap-4">
        <img src="assets/fluent_weather-sunny-16-regular.svg" alt="sun" class="w-6 h-6">
        <label class="relative inline-flex items-center cursor-pointer">
          <input type="checkbox" class="sr-only peer">
          <div class="w-12 h-7 bg-purple-600 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[4px] after:left-[4px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div>
        </label>
        <img src="assets/fluent_weather-moon-16-regular.svg" alt="moon" class="w-6 h-6">
      </div>
    </header>

    <main class="grid lg:grid-cols-2 gap-16 lg:gap-32">
      
      <div>
        <h1 class="text-5xl lg:text-64px font-light leading-tight">
          Quiz completed<br>
          <span class="font-bold">You scored...</span>
        </h1>
      </div>

      <section class="flex flex-col gap-8">
        
        <div class="bg-color-bleu-800 p-12 rounded-3xl flex flex-col items-center text-center">
          <div class="flex items-center gap-4 mb-10">
            <span class="p-2 bg-purple-100 rounded-xl">
              <img src="assets/Subject Icon Container-4.png" alt="" class="w-10 h-10">
            </span>
            <span class="text-2xl font-medium">Accessibility</span>
          </div>

          <span class="text-[144px] font-bold leading-none mb-4">8</span>
          <p class="text-color-grey-500 text-2xl italic">out of 10</p>
        </div>

        <button class="w-full py-6 bg-purple-600 hover:bg-purple-500 text-white text-2xl font-bold rounded-3xl transition-all shadow-lg shadow-purple-900/20">
          Play Again
        </button>
      </section>
      </main>
    </div>
  </body>
</html>
