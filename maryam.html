<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<style type="text/tailwindcss">
  @theme {
    /*-- COLORS --*/
      --color-grey-500: #626C7F;
      --color-grey-50: #F4F6FA;

      --color-bleu-950: #2D3949;
      --color-bleu-900: #313E51;
      --color-bleu-850: #3B4D66;
      --color-bleu-500: #306AFF;
      --color-bleu-300: #ABC1E1;
      --color-bleu-100: #EDF1F9;
      --color-bleu-50: #EBF0FF;

      --color-green-500: #2FD887;
      --color-green-100: #E0FDEF;

      --color-purple-600: #A729F5;
      --color-purple-100: #F6E7FF;

      --color-orange-400: #FF7E35;
      --color-orange-50: #FFF5ED;

      --color-red-500: #EE5454;

      /* ---- font ---- */
      --font-Rubik: "Rubik", sans-serif;
      --font-inherit: inherit;

      /* Typography */
      --text-prst-1: 144px;
        --text-prst-1--line-height: 100%;
      --text-prst-1-sm: 88px;
        --text-prst-1-sm--line-height: 100%;
      
      --text-prst-2: 64px;
        --text-prst-2--line-height: 100%;
      --text-prst-2-sm: 40px;
        --text-prst-2-sm--line-height: 100%;

      --text-prst-3: 36px;
        --text-prst-3--line-height: 120%;
      --text-prst-3-sm: 20px;
        --text-prst-3-sm--line-height: 120%;

      --text-prst-4: 28px;
        --text-prst-4--line-height: 100%;
      --text-prst-4-sm: 18px;
        --text-prst-4-sm--line-height: 100%;
      
      --text-prst-5: 24px;
        --text-prst-5--line-height: 150%;
      --text-prst-5-sm: 14px;
        --text-prst-5-sm--line-height: 150%;

      --text-prst-6: 20px;
        --text-prst-6--line-height: 150%;
    }

    body { 
      @apply font-Rubik text-white
    }

    .text-Preset1 {
      @apply text-prst-1 font-medium tracking-0
    }

    .text-Preset1-mobile {
      @apply text-prst-1-sm font-medium tracking-0
    }

    .text-Preset2-Md {
      @apply text-prst-2 font-medium tracking-0
    }

    .text-Preset2-Md-mobile {
      @apply text-prst-2-sm font-medium tracking-0
    }

    .text-Preset2-Lt {
      @apply text-prst-2 font-light tracking-0
    }

    .text-Preset2-Lt-mobile {
      @apply text-prst-2-sm font-light tracking-0
    }

    .text-Preset3 {
      @apply text-prst-3 font-medium tracking-0
    }

    .text-Preset3-mobile {
      @apply text-prst-3-sm font-medium tracking-0
    }

    .text-Preset4 {
      @apply text-prst-4 font-medium tracking-0
    }

    .text-Preset4-mobile {
      @apply text-prst-4-sm font-medium tracking-0
    }

    .text-Preset5-Md {
      @apply text-prst-5 font-medium tracking-0
    }

    .text-Preset5-Bs {
      @apply text-prst-5 font-normal tracking-0
    }

    .text-Preset5-mobile {
      @apply text-prst-5-sm italic tracking-0
    }

    .text-Preset6 {
      @apply text-prst-6 italic tracking-0
    }
</style>
<body>
  
    
</body>
</html>
